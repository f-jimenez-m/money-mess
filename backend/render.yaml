# render.yaml - Configuración automática de Render
# Documentación: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: moneymess-backend
    runtime: node
    plan: starter
    
    # Build
    buildCommand: npm install && npm run build
    startCommand: npm run prisma:migrate:deploy && npm start
    
    # Health check
    healthCheckPath: /health
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3000
      - key: LOG_LEVEL
        value: info
      - key: JWT_EXPIRES_IN
        value: 7d
        
      # Valores secretos (configurar en Render dashboard)
      - key: DATABASE_URL
        fromDatabase:
          name: moneymess-db
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

databases:
  - name: moneymess-db
    databaseName: moneymess
    plan: starter
    region: oregon
