# render.yaml - Configuración de Render para Frontend
# Ubicación: frontend/render.yaml
# Render ejecutará comandos desde este directorio

services:
  - type: web
    name: moneymess-frontend
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run preview
    
    envVars:
      - key: VITE_API_URL
        value: https://money-mess-api.onrender.com
